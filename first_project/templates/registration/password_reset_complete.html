{% extends "base.html" %}

{% block title %}Password Reset Complete - NewsHub{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card card">
        <div class="card-body text-center">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="1.5" style="margin-bottom:16px;">
                <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <h1>Password Reset Complete</h1>
            <p class="subtitle" style="margin-bottom:20px;">Your password has been successfully changed. You can now sign in with your new password.</p>
            <a href="{% url 'login' %}" class="btn btn-primary btn-lg">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
