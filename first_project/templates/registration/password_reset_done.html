{% extends "base.html" %}

{% block title %}Email Sent - NewsHub{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card card">
        <div class="card-body text-center">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="1.5" style="margin-bottom:16px;">
                <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <h1>Check Your Email</h1>
            <p class="subtitle" style="margin-bottom:16px;">We've sent password reset instructions to your email address. Please check your inbox (and spam folder).</p>
            <a href="{% url 'login' %}" class="btn btn-primary">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
