{% extends "base.html" %}

{% block title %}Logged Out - NewsHub{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card card">
        <div class="card-body text-center">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="1.5" style="margin-bottom:16px;">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            <h1>You've been logged out</h1>
            <p class="subtitle">Thanks for visiting! See you again soon.</p>

            <div style="margin-top:24px; display:flex; gap:12px; justify-content:center;">
                <a href="{% url 'login' %}" class="btn btn-primary">Sign In Again</a>
                <a href="{% url 'home' %}" class="btn btn-secondary">Go to Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
