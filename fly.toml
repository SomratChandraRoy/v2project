# fly.toml app configuration file generated for v2project-sscldg on 2026-03-01T20:10:28Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'v2project-sscldg'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/"
  timeout = "5s"

[env]
  DEBUG = "False"
  ALLOWED_HOSTS = ".fly.dev,v2project-sscldg.fly.dev"
  CSRF_TRUSTED_ORIGINS = "https://v2project-sscldg.fly.dev"

[processes]
  app = ""

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
